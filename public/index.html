<!DOCTYPE html>
<html>
<head>
    <title>SENTOX</title>
</head>

<body>

<h1>SENTOX</h1>

<input type="text" id="searchInput" placeholder="Nom plante ou produit">

<button onclick="rechercher()">Rechercher</button>
<button onclick="analyser()">Analyser</button>

<div id="resultats"></div>

<script>
const API_URL = "http://192.168.1.13:8000";

// RECHERCHER
async function rechercher() {
    const input = document.getElementById("searchInput").value;

    const res = await fetch(${API_URL}/search?nom=${input});
    const data = await res.json();

    let resultDiv = document.getElementById("resultats");
    resultDiv.innerHTML = "";

    data.forEach(item => {
        resultDiv.innerHTML += `
            <div>
                <b>${item.nom}</b> (${item.type}) <br>
                Toxicité: ${item.score_toxicologique}
            </div><hr>
        `;
    });
}

// ANALYSER
async function analyser() {
    const res = await fetch(${API_URL}/interaction-multi?ids=1,2);
    const data = await res.json();

    let resultDiv = document.getElementById("resultats");
    resultDiv.innerHTML = `
        <b>Substances:</b> ${data.substances.join(", ")} <br>
        <b>Interactions:</b><br> ${data.interactions.join("<br>")}
    `;
}

</body>
</html>
