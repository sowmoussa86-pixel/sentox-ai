<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTOX</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

h1{
    color:#15803d;
    margin-top:20px;
}

input{
    width:85%;
    max-width:400px;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-size:14px;
    cursor:pointer;
}

button:active{
    background:#14532d;
}

.card{
    background:white;
    margin:10px auto;
    padding:15px;
    border-radius:10px;
    text-align:left;
    width:90%;
    max-width:500px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<h1>SENTOX</h1>

<input id="searchInput" placeholder="Entrer une substance...">

<br>

<button onclick="rechercher()">🔎 Recherche</button>
<button onclick="interaction()">⚗️ Interaction</button>
<button onclick="fiche()">📊 Fiche</button>

<div id="resultats"></div>

<!-- 🔥 SCRIPT EN BAS (IMPORTANT) -->
<script>

// 🔥 API HTTPS (CRITIQUE)
const API = "https://sentox-ai-backend.onrender.com";


// 🔎 RECHERCHE
async function rechercher(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    div.innerHTML = "Chargement...";

    try{
        let res = await fetch(API + "/search?nom=" + encodeURIComponent(val));
        let data = await res.json();

        let html = "";

        if(data.source === "local"){
            data.data.forEach(x=>{
                html += `
                <div class="card">
                <b>${x.nom}</b><br>
                Description: ${x.description || "-"}<br>
                Toxicité: ${x.toxicologie || "-"}
                </div>`;
            });
        }

        else if(data.source === "pubchem"){
            html = `
            <div class="card">
            Formule: ${data.data.formula}<br>
            Masse: ${data.data.weight}
            </div>`;
        }

        else if(data.error){
            html = <div class="card">${data.error}</div>;
        }

        div.innerHTML = html;

    }catch(e){
        div.innerHTML = "<div class='card'>Erreur serveur</div>";
    }
}


// ⚗️ INTERACTION
async function interaction(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    try{
        let res = await fetch(API + "/interaction?noms=" + encodeURIComponent(val));
        let data = await res.json();

        div.innerHTML = <div class="card">${data.result}</div>;
    }catch(e){
        div.innerHTML = "<div class='card'>Erreur interaction</div>";
    }
}


// 📊 FICHE
async function fiche(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    try{
        let res = await fetch(API + "/fiche?nom=" + encodeURIComponent(val));
        let data = await res.json();

        if(data.fiche){
            div.innerHTML = `
            <div class="card">
            <pre style="white-space: pre-wrap;">
${data.fiche}
            </pre>
            </div>`;
        } else {
            div.innerHTML = "<div class='card'>Aucune fiche disponible</div>";
        }

    }catch(e){
        div.innerHTML = "<div class='card'>Erreur fiche</div>";
    }
}

</script>

</body>
</html>
