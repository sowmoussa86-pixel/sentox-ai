<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: url("logo.png") no-repeat center center/cover;
    height:100vh;
}

.overlay {
    height:100vh;
    background:rgba(255,255,255,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.search-box {
    display:flex;
    width:60%;
    max-width:500px;
    background:white;
    border-radius:30px;
    overflow:hidden;
}

.search-box input {
    flex:1;
    padding:15px;
    border:none;
}

.search-box button {
    background:green;
    color:white;
    border:none;
    padding:15px;
}

.card {
    background:white;
    margin-top:10px;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="overlay">

<h1>SENTOX</h1>

<div class="search-box">
<input id="searchInput" placeholder="Rechercher...">
<button onclick="rechercher()">🔍</button>
</div>

<div id="resultats"></div>

</div>

<script>
const API = "https://sentox-ai-1.onrender.com";

async function rechercher(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    div.innerHTML = "Chargement...";

    let res = await fetch(`${API}/search?nom=${encodeURIComponent(val)}`);
    let data = await res.json();

    let html = "";

    // LOCAL
    if(data.source === "local"){
        data.data.forEach(x=>{
            html += `<div class="card">
            <h3>${x.nom}</h3>
            Type: ${x.type}
            </div>`;
        });
    }

    // PUBCHEM
    if(data.source === "pubchem"){
        html += `<div class="card">
        Formule: ${data.data.formula}<br>
        Masse: ${data.data.weight}
        </div>`;
    }

    // IA
    if(data.source === "ai"){
        html += `<div class="card">${data.data}</div>`;
    }

    if(data.error){
        html = `<div class="card">${data.error}</div>`;
    }

    div.innerHTML = html;
}
</script>

</body>
</html>
