<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SENTOX ULTIME</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #0f2027, #2c5364);
  color: white;
}

.box {
  background: white;
  color: black;
  padding: 20px;
  margin: 40px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
}

input {
  padding: 10px;
  width: 80%;
}

button {
  padding: 10px;
  margin: 5px;
  background: #2c5364;
  color: white;
  border: none;
}

img {
  width: 150px;
}
</style>
</head>

<body>

<div class="box">
  <img src="logo.png">
  <h2>SENTOX ULTIME</h2>

  <input id="produit" placeholder="Produit"><br><br>

  <button onclick="analyser()">Analyse</button>
  <button onclick="pdf()">PDF</button>

  <div id="res"></div>
</div>

<script>
async function analyser() {
  let p = document.getElementById("produit").value;

  let r = await fetch(`/analyze?produit=${p}`);
  let d = await r.json();

  document.getElementById("res").innerHTML = `
    <h3>${d.nom}</h3>
    <p>Risque : ${d.risque}</p>
    <p>Score : ${d.score}</p>
    <p>Formule : ${d.formule}</p>
    <p>Poids : ${d.poids}</p>
    <p>PubMed : ${d.pubmed}</p>
    <p>Toxicité : ${d.toxicite}</p>
  `;
}

function pdf() {
  let p = document.getElementById("produit").value;
  window.open(`/pdf-local?produit=${p}`);
}
</script>

</body>
</html>
