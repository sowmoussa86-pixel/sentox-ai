<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:url("logo.png") no-repeat center center;
    background-size:cover;
}

/* overlay */
.overlay {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(2px);

    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* titre */
.logo-title {
    font-size:60px;
    font-weight:bold;
    color:#1f7a3a;
    margin-bottom:20px;
    text-shadow:0 2px 10px rgba(0,0,0,0.2);
}

/* barre */
.search-box {
    display:flex;
    align-items:center;
    background:white;
    border-radius:50px;
    overflow:hidden;
    width:500px;
    max-width:90%;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.search-box input {
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    font-size:16px;
}

.search-box button {
    background:#1f7a3a;
    color:white;
    border:none;
    padding:15px 20px;
    cursor:pointer;
}

/* boutons */
.actions {
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    justify-content:center;
}

.actions button {
    background:white;
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
    transition:0.2s;
}

.actions button:hover {
    background:#16a34a;
    color:white;
}

/* résultats */
.results {
    margin-top:20px;
    width:90%;
    max-width:600px;
}

.card {
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    text-align:left;
}

/* footer */
.footer {
    position:absolute;
    bottom:15px;
    text-align:center;
    width:100%;
    font-size:14px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="logo-title">SENTOX</div>

<div class="search-box">
    <input id="searchInput" placeholder="Rechercher une substance..." />
    <button onclick="rechercher()">🔍</button>
</div>

<div class="actions">
    <button onclick="rechercher()">🔎 Recherche</button>
    <button onclick="analyseIA()">🧠 IA</button>
    <button onclick="interaction()">⚗️ Interaction</button>
    <button onclick="exportPDF()">📄 PDF</button>
</div>

<div id="resultats" class="results"></div>

</div>

<div class="footer">
<b>SENTOX</b><br>
Plateforme web et Application mobile
</div>

<script>
const API="https://sentox-ai-1.onrender.com";

/* 🔎 RECHERCHE */
async function rechercher(){
 let val=document.getElementById("searchInput").value;
 let div=document.getElementById("resultats");

 if(!val){
   div.innerHTML="<p>Entrer une substance</p>";
   return;
 }

 div.innerHTML="Chargement...";

 let res=await fetch(`${API}/search?nom=${val}`);
 let data=await res.json();

 let html="";

 data.local.forEach(x=>{
 html+=`
 <div class="card">
   <h3>${x.nom}</h3>

   <b>DL50:</b> ${x.dl50}<br>
   <b>Danger:</b> ${x.danger}<br>
   <b>Organe cible:</b> ${x.organe}<br>

   <hr>

   <b>Analyse toxicologique:</b><br>
   Classe: ${x.toxicologie.classe}<br>
   Voie: ${x.toxicologie.voie_exposition}<br>
   Effets: ${x.toxicologie.effets}
 </div>`;
});
if(data.scientifique){
 html+=`
 <div class="card">
   <b>Données scientifiques (PubChem):</b><br>
   Formule: ${data.scientifique.formula}<br>
   Poids moléculaire: ${data.scientifique.poids_moleculaire}
 </div>`;
}

 if(data.suggestions.length){
  html+=`<div class="card">Suggestions: ${data.suggestions.join(", ")}</div>`;
 }

 div.innerHTML=html;
}

/* 🧠 IA */
function analyseIA(){
 let val=document.getElementById("searchInput").value;

 if(!val){
   alert("Entrer une substance");
   return;
 }

 alert("Analyse IA : basée sur DL50 + organes cibles");
}

/* ⚗️ INTERACTION */
async function interaction(){
 let ids=prompt("Entrer IDs (ex: 1,2)");

 if(!ids) return;

 let res=await fetch(`${API}/interaction?ids=${ids}`);
 let data=await res.json();

 document.getElementById("resultats").innerHTML=`
 <div class="card">
  Substances: ${data.substances.join(", ")}<br>
  Résultat: ${data.interactions.join(", ")}
 </div>`;
}

/* 📄 PDF */
async function exportPDF(){
 let val=document.getElementById("searchInput").value;

 if(!val){
   alert("Entrer une substance");
   return;
 }

 await fetch(`${API}/export?nom=${val}`);
 alert("PDF généré !");
}
</script>

</body>
</html>
