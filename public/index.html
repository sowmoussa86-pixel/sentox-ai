<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX PRO</title>
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px">

<h1>SENTOX PRO 🧪</h1>

<input id="searchInput" placeholder="Nom substance..." />
<button onclick="rechercher()">Rechercher</button>

<div id="resultats"></div>

<script>
const API = "https://sentox-ai-1.onrender.com";

async function rechercher() {
    let input = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");
    div.innerHTML = "Chargement...";

    let res = await fetch(`${API}/search?nom=${input}`);
    let data = await res.json();

    let html = "";

    data.local.forEach(x=>{
        html += `<div style="background:white;padding:10px;margin:10px">
        <h3>${x.nom}</h3>
        DL50: ${x.dl50}<br>
        Toxicité: ${x.score_toxicologique}
        </div>`;
    });

    if(data.scientifique){
        html += `<div style="background:#eef;padding:10px">
        Formule: ${data.scientifique.formula}<br>
        Poids: ${data.scientifique.poids_moleculaire}
        </div>`;
    }

    if(data.suggestions.length){
        html += `<p>Suggestions: ${data.suggestions.join(", ")}</p>`;
    }

    div.innerHTML = html;
}
</script>

</body>
</html>
