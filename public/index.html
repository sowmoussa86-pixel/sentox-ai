<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SENTOX PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url("logo.png") no-repeat center center/cover;
    height: 100vh;
}

/* overlay léger pour lisibilité */
.overlay {
    height: 100vh;
    background: rgba(255,255,255,0.2);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* titre */
.logo-title {
    font-size: 60px;
    font-weight: bold;
    color: #16a34a;
    margin-bottom: 20px;
}

/* barre de recherche */
.search-box {
    display: flex;
    width: 60%;
    max-width: 600px;
    background: white;
    border-radius: 50px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.search-box input {
    flex: 1;
    padding: 15px;
    border: none;
    font-size: 16px;
    outline: none;
}

.search-box button {
    background: #16a34a;
    border: none;
    color: white;
    padding: 15px 20px;
    cursor: pointer;
}

/* boutons */
.buttons {
    margin-top: 20px;
}

.buttons button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #e5e7eb;
    cursor: pointer;
}

/* résultats */
#resultats {
    margin-top: 30px;
    width: 60%;
    max-width: 700px;
}

.card {
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-radius: 10px;
}

/* footer */
.footer {
    position: absolute;
    bottom: 10px;
    color: #065f46;
}
</style>

</head>

<body>

<div class="overlay">

<div class="logo-title">SENTOX</div>

<div class="search-box">
    <input id="searchInput" placeholder="Rechercher une substance..." />
    <button onclick="rechercher()">🔍</button>
</div>

<div class="buttons">
    <button onclick="rechercher()">🔎 Recherche</button>
    <button onclick="analyseIA()">🧠 IA</button>
    <button onclick="interaction()">⚗️ Interaction</button>
    <button onclick="exportPDF()">📄 PDF</button>
</div>

<div id="resultats"></div>

</div>

<div class="footer">
SENTOX - Plateforme web et Application mobile
</div>

<script>
const API = "https://sentox-ai-1.onrender.com";

async function rechercher(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    div.innerHTML = "Chargement...";

    let res = await fetch(`${API}/search?nom=${encodeURIComponent(val)}`);
    let data = await res.json();

    let html = "";

    data.local.forEach(x=>{
        html += `
        <div class="card">
            <h3>${x.nom}</h3>
            DL50: ${x.dl50}<br>
            Danger: ${x.danger}<br>
            Organe: ${x.organe}
        </div>`;
    });

    if(data.scientifique){
        html += `
        <div class="card">
            Formule: ${data.scientifique.formula}<br>
            Poids: ${data.scientifique.weight}
        </div>`;
    }

    div.innerHTML = html;
}

async function analyseIA(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    div.innerHTML = "Analyse IA...";

    let res = await fetch(`${API}/ai?nom=${encodeURIComponent(val)}`);
    let data = await res.json();

    div.innerHTML = `<div class="card">${data.result || data.error}</div>`;
}

async function interaction(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    if(!val.includes(",")){
        div.innerHTML = "Entrer plusieurs substances (ex: paracetamol,methanol)";
        return;
    }

    let res = await fetch(`${API}/interaction?noms=${encodeURIComponent(val)}`);
    let data = await res.json();

    div.innerHTML = `
    <div class="card">
        <h3>Interaction</h3>
        ${data.interaction}
    </div>`;
}

function exportPDF(){
    let val = document.getElementById("searchInput").value;
    window.open(`${API}/export?nom=${encodeURIComponent(val)}`);
}
</script>

</body>
</html>
