<!DOCTYPE html>
<html>
<head>
    <title>SENTOX PRO</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f8;
            padding: 50px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        #resultat {
            margin-top: 30px;
            padding: 20px;
            background: white;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>SENTOX PRO</h1>

<input type="text" id="produit" placeholder="Entrer produit">
<br>

<button onclick="analyser()">Analyser</button>
<button onclick="pdf()">PDF</button>

<div id="resultat"></div>

<script>
async function analyser() {
    const produit = document.getElementById("produit").value;

    const res = await fetch(`/analyze?produit=${produit}`);
    const data = await res.json();

    document.getElementById("resultat").innerHTML = `
        <h2>Résultat</h2>
        <p><b>Produit :</b> ${data.nom}</p>
        <p><b>Risque :</b> ${data.niveau} ${data.risque}</p>
        <p><b>Score :</b> ${data.score}/10</p>
        <p><b>Organe :</b> ${data.organe_cible}</p>
        <p><b>Dose :</b> ${data.dose_max}</p>
        <p><b>Toxicité :</b> ${data.toxicite}</p>
        <p><b>Interactions :</b> ${data.interactions.join(", ")}</p>
        <p><b>Conseils :</b> ${data.conseils}</p>
    `;
}

function pdf() {
    const produit = document.getElementById("produit").value;
    window.open(`/pdf?produit=${produit}`);
}
</script>

</body>
</html>
