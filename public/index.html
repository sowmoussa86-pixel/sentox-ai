<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f2f2f2;
}
h1{
    color:green;
}
input{
    width:80%;
    padding:12px;
    border-radius:10px;
    border:2px solid black;
}
button{
    padding:12px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:green;
    color:white;
    font-weight:bold;
}
.card{
    background:white;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
</style>

</head>

<body>

<h1>SENTOX</h1>

<input id="searchInput" placeholder="Entrer une substance...">

<br><br>

<button onclick="rechercher()">🔍 Recherche</button>
<button onclick="interaction()">🧪 Interaction</button>
<button onclick="fiche()">📊 Fiche</button>

<div id="resultats"></div>

<script>

const API = "https://sentox-ai-backend.onrender.com";

async function rechercher(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    let res = await fetch(API + "/search?nom=" + val);
    let data = await res.json();

    div.innerHTML = "<div class='card'>" + JSON.stringify(data) + "</div>";
}

async function interaction(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    let res = await fetch(API + "/interaction?noms=" + val);
    let data = await res.json();

    div.innerHTML = "<div class='card'>" + data.result + "</div>";
}

async function fiche(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    let res = await fetch(API + "/fiche?nom=" + val);
    let data = await res.json();

    div.innerHTML = "<div class='card'>" + JSON.stringify(data) + "</div>";
}

</script>

</body>
</html>
