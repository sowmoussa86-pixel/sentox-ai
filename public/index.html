<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
}

h1{
    color:#15803d;
}

input{
    width:80%;
    padding:12px;
    margin:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#16a34a;
    color:white;
    font-size:14px;
}

.card{
    background:white;
    margin:10px;
    padding:15px;
    border-radius:10px;
    text-align:left;
}
</style>

</head>

<body>

<h1>SENTOX</h1>

<input id="searchInput" placeholder="Entrer une substance...">

<br>

<button onclick="rechercher()">🔎 Recherche</button>
<button onclick="interaction()">⚗️ Interaction</button>
<button onclick="fiche()">📊 Fiche</button>

<div id="resultats"></div>

<script>

// 🔥 API (IMPORTANT)
const API = "https://sentox-ai-backend.onrender.com";


// 🔎 RECHERCHE
async function rechercher(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    div.innerHTML = "Chargement...";

    try{
        let res = await fetch(API + "/search?nom=" + encodeURIComponent(val));
        let data = await res.json();

        let html = "";

        if(data.source === "local"){
            data.data.forEach(x=>{
                html += `
                <div class="card">
                <b>${x.nom}</b><br>
                Description: ${x.description || "-"}<br>
                Toxicité: ${x.toxicologie || "-"}
                </div>`;
            });
        }

        else if(data.source === "pubchem"){
            html = `
            <div class="card">
            Formule: ${data.data.formula}<br>
            Masse: ${data.data.weight}
            </div>`;
        }

        else if(data.error){
            html = <div class="card">${data.error}</div>;
        }

        div.innerHTML = html;

    }catch(e){
        div.innerHTML = "<div class='card'>Erreur serveur</div>";
    }
}


// ⚗️ INTERACTION
async function interaction(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    try{
        let res = await fetch(API + "/interaction?noms=" + encodeURIComponent(val));
        let data = await res.json();

        div.innerHTML = <div class="card">${data.result}</div>;

    }catch(e){
        div.innerHTML = "<div class='card'>Erreur interaction</div>";
    }
}


// 📊 FICHE
async function fiche(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    try{
        let res = await fetch(API + "/fiche?nom=" + encodeURIComponent(val));
        let data = await res.json();

        div.innerHTML = `
        <div class="card">
        <pre style="white-space: pre-wrap;">
${data.fiche}
        </pre>
        </div>`;

    }catch(e){
        div.innerHTML = "<div class='card'>Erreur fiche</div>";
    }
}

</script>

</body>
</html>
