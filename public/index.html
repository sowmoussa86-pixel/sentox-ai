<!DOCTYPE html>
<html>
<head>
    <title>SENTOX</title>
</head>

<body>

<h1>SENTOX</h1>

<input type="text" id="searchInput" placeholder="Nom plante ou produit">
<button onclick="rechercher()">Rechercher</button>

<div id="resultats"></div>

<script>
const API_URL = "https://sentox-ai-1.onrender.com";

async function rechercher() {
    const input = document.getElementById("searchInput").value;

    if (!input) {
        alert("Entre un nom");
        return;
    }

    try {
        const res = await fetch(API_URL + "/search?nom=" + input);
        const data = await res.json();

        let div = document.getElementById("resultats");
        div.innerHTML = "";

        data.forEach(item => {
            div.innerHTML += `
                <div style="margin:10px;padding:10px;border:1px solid #ccc;">
                    <b>${item.nom}</b><br>
                    DL50: ${item.dl50}<br>
                    Toxicité: ${item.score_toxicologique}
                </div>
            `;
        });

    } catch (err) {
        console.error(err);
        alert("Erreur API");
    }
}
</script>

</body>
</html>
