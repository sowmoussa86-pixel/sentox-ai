<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:url("logo.png") no-repeat center center;
    background-size:cover;
    height:100vh;
}

/* couche transparente */
.overlay {
    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(4px);

    display: flex;
    flex-direction: column;
    justify-content: center;   /* 👉 centre vertical */
    align-items: center;       /* 👉 centre horizontal */
    height: 100vh;
}

/* logo titre */
.logo-title {
    font-size:60px;
    font-weight:bold;
    color:#1f7a3a;
    margin-bottom:20px;
}

/* barre recherche */
.search-box {
    display:flex;
    align-items:center;
    background:white;
    border-radius:50px;
    overflow:hidden;
    width:500px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

.search-box input {
    flex:1;
    padding:15px;
    border:none;
    outline:none;
    font-size:16px;
}

.search-box button {
    background:#1f7a3a;
    color:white;
    border:none;
    padding:15px 20px;
    cursor:pointer;
}

/* footer */
.footer {
    position:absolute;
    bottom:20px;
    text-align:center;
    font-size:14px;
    color:#333;
}
</style>
</head>

<body>

<div class="overlay">

<div class="logo-title">SENTOX</div>

<div class="search-box">
    <input id="searchInput" placeholder="Rechercher une substance..." />
    <button onclick="rechercher()">🔍</button>
</div>

</div>

<div class="footer">
<b>SENTOX</b><br>
Plateforme web et Application mobile
</div>

<script>
const API="https://sentox-ai-1.onrender.com";

async function rechercher(){
 let val=document.getElementById("searchInput").value;
 let res=await fetch(`${API}/search?nom=${val}`);
 let data=await res.json();

 alert("Résultats trouvés: " + data.local.length);
}
</script>

</body>
</html>
