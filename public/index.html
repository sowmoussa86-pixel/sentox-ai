<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:url("logo.png") no-repeat center center;
    background-size:cover;
}

.overlay {
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(2px);

    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.logo-title {
    font-size:60px;
    font-weight:bold;
    color:#1f7a3a;
    margin-bottom:20px;
}

.search-box {
    display:flex;
    background:white;
    border-radius:50px;
    overflow:hidden;
    width:500px;
    max-width:90%;
}

.search-box input {
    flex:1;
    padding:15px;
    border:none;
    outline:none;
}

.search-box button {
    background:#1f7a3a;
    color:white;
    border:none;
    padding:15px;
}

.actions {
    margin-top:20px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.actions button {
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.results {
    margin-top:20px;
    width:90%;
    max-width:600px;
}

.card {
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    text-align:left;
}
</style>
</head>

<body>

<div class="overlay">

<div class="logo-title">SENTOX</div>

<div class="search-box">
<input id="searchInput" placeholder="Rechercher..." />
<button onclick="rechercher()">🔍</button>
</div>

<div class="actions">
<button onclick="rechercher()">🔎 Recherche</button>
<button onclick="analyseIA()">🧠 IA</button>
<button onclick="interaction()">⚗️ Interaction</button>
<button onclick="exportPDF()">📄 PDF</button>
</div>

<div id="resultats" class="results"></div>

</div>

<script>
const API="https://sentox-ai-1.onrender.com";

/* 🔎 RECHERCHE */
async function rechercher(){
 let val=document.getElementById("searchInput").value.trim();
 let div=document.getElementById("resultats");

 if(!val){
   div.innerHTML="<div class='card'>Entrer une substance</div>";
   return;
 }

 try{
   let res=await fetch(`${API}/search?nom=${encodeURIComponent(val)}`);
   let data=await res.json();

   let html="";

   if(!data.local || data.local.length===0){
     html="<div class='card'>Aucun résultat trouvé</div>";
   } else {
     data.local.forEach(x=>{
      html+=`
      <div class="card">
       <h3>${x.nom}</h3>
       DL50: ${x.dl50}<br>
       Danger: ${x.danger}<br>
       Organe: ${x.organe}<br>
      </div>`;
     });
   }

   if(data.scientifique){
    html+=`
    <div class="card">
     <b>Données scientifiques:</b><br>
     Formule: ${data.scientifique.formula}<br>
     Poids: ${data.scientifique.poids_moleculaire}
    </div>`;
   }

   div.innerHTML=html;

 }catch(err){
   div.innerHTML="<div class='card'>Erreur serveur</div>";
 }
}

/* 🧠 IA */
async function analyseIA(){
 let val=document.getElementById("searchInput").value.trim();
 let div=document.getElementById("resultats");

 if(!val){
   div.innerHTML="<div class='card'>Entrer une substance</div>";
   return;
 }

 div.innerHTML="<div class='card'>Analyse en cours...</div>";

 try{
   let res=await fetch(`${API}/ai?nom=${encodeURIComponent(val)}`);
   let data=await res.json();

   div.innerHTML=`
   <div class="card">
   <h3>Analyse IA</h3>
   ${data.result}
   </div>`;
 }catch(err){
   div.innerHTML="<div class='card'>Erreur IA</div>";
 }
}

 let res=await fetch(`${API}/search?nom=${encodeURIComponent(val)}`);
 let data=await res.json();

 if(!data.local || data.local.length===0){
   div.innerHTML="<div class='card'>Aucune donnée</div>";
   return;
 }

 let x=data.local[0];

 div.innerHTML=`
 <div class="card">
 <h3>Analyse IA</h3>
 Substance: ${x.nom}<br><br>
 Risque: ${x.danger}<br>
 Organe: ${x.organe}<br><br>
 Interprétation: Cette substance doit être utilisée avec précaution.
 </div>`;
}

/* ⚗️ INTERACTION */
function interaction(){
 let val=document.getElementById("searchInput").value.trim();
 let div=document.getElementById("resultats");

 if(!val.includes(",")){
   div.innerHTML="<div class='card'>Entrer au moins 2 substances séparées par virgule</div>";
   return;
 }

 let noms=val.split(",");

 let result="<div class='card'><h3>Interaction</h3>";
 result+=`Substances: ${noms.join(", ")}<br><br>`;

 if(val.includes("paracetamol") && val.includes("methanol")){
   result+="⚠️ Risque hépatotoxique élevé";
 } else {
   result+="✅ Aucune interaction majeure connue";
 }

 result+="</div>";

 div.innerHTML=result;
}

/* 📄 PDF */
function exportPDF(){
 let val=document.getElementById("searchInput").value.trim();

 if(!val){
   alert("Entrer une substance");
   return;
 }

 window.open(`${API}/export?nom=${encodeURIComponent(val)}`);
}
</script>

</body>
</html>
