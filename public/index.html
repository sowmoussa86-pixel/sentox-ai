<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX PRO</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
    padding: 20px;
}

.header {
    display:flex;
    align-items:center;
    gap:10px;
}

.logo {
    width:50px;
    height:50px;
    background:#16a34a;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
}

.card {
    background:white;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">
<div class="logo">S</div>
<h1>SENTOX</h1>
</div>

<input id="searchInput" placeholder="Substance..." />
<button onclick="rechercher()">Rechercher</button>

<div id="resultats"></div>

<script>
const API = "https://sentox-ai-1.onrender.com";

async function rechercher(){
 let val = document.getElementById("searchInput").value;
 let div = document.getElementById("resultats");
 div.innerHTML="Chargement...";

 let res = await fetch(`${API}/search?nom=${val}`);
 let data = await res.json();

 let html="";

 data.local.forEach(x=>{
  html+=`<div class="card">
   <h3>${x.nom}</h3>
   DL50: ${x.dl50}<br>
   Toxicité: ${x.score_toxicologique}
  </div>`;
 });

 if(data.scientifique){
  html+=`<div class="card">
   <b>Formule:</b> ${data.scientifique.formula}<br>
   <b>Poids:</b> ${data.scientifique.poids_moleculaire}
  </div>`;
 }

 if(data.suggestions.length){
  html+=`<div class="card">
   Suggestions: ${data.suggestions.join(", ")}
  </div>`;
 }

 div.innerHTML=html;
}
</script>

</body>
</html>
