<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SENTOX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background: url("logo.png") no-repeat center center/cover;
    height:100vh;
}

.overlay {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: rgba(255,255,255,0.2);
}

.logo-title {
    font-size:40px;
    color:#15803d;
    margin-bottom:20px;
}

.search-box {
    display:flex;
    width:90%;
    max-width:500px;
    background:white;
    border-radius:50px;
    overflow:hidden;
}

.search-box input {
    flex:1;
    padding:15px;
    border:none;
}

.search-box button {
    padding:15px;
    border:none;
    background:#16a34a;
    color:white;
}

.buttons {
    margin-top:15px;
}

.buttons button {
    margin:5px;
    padding:10px 15px;
}

.card {
    background:white;
    padding:15px;
    margin:10px auto;
    border-radius:10px;
    width:90%;
    max-width:600px;
}
</style>
</head>

<body>

<div class="overlay">

<div class="logo-title">SENTOX</div>

<div class="search-box">
<input id="searchInput" placeholder="Rechercher une substance...">
<button onclick="rechercher()">🔍</button>
</div>

<div class="buttons">
<button onclick="rechercher()">🔎 Recherche</button>
<button onclick="checkInteraction()">⚗️ Interaction</button>
<button onclick="ficheComplete()">📊 Fiche complète</button>
</div>

<div id="resultats"></div>

</div>

<script>

// 🔥 API CORRIGÉE (IMPORTANT)
const API = "https://sentox-ai-backend.onrender.com";


// 🔎 RECHERCHE
async function rechercher(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    div.innerHTML = "Chargement...";

    try{
        let res = await fetch(${API}/search?nom=${encodeURIComponent(val)});
        let data = await res.json();

        let html = "";

        if(data.source === "local"){
            data.data.forEach(x=>{
                html += `<div class="card">
                <h3>${x.nom}</h3>
                <b>Description:</b> ${x.description || "-"}<br>
                <b>Pharmacologie:</b> ${x.pharmacologie ? x.pharmacologie.join(", ") : "-"}<br>
                <b>Toxicité:</b> ${x.toxicologie || "-"}<br>
                <b>Organes:</b> ${x.organes || "-"}<br>
                <b>Indications:</b> ${x.indications ? x.indications.join(", ") : "-"}<br>
                <b>Posologie:</b> ${x.posologie || "-"}<br>
                <b>Effets:</b> ${x.effets ? x.effets.join(", ") : "-"}
                </div>`;
            });
        }

        if(data.source === "pubchem"){
            html += `<div class="card">
            Formule: ${data.data.formula}<br>
            Masse: ${data.data.weight}
            </div>`;
        }

        if(data.error){
            html = <div class="card">${data.error}</div>;
        }

        div.innerHTML = html;

    } catch(e){
        div.innerHTML = "<div class='card'>Erreur serveur</div>";
    }
}


// ⚗️ INTERACTION
async function checkInteraction(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    try{
        let res = await fetch(${API}/interaction?noms=${encodeURIComponent(val)});
        let data = await res.json();

        div.innerHTML += <div class="card">${data.result}</div>;
    } catch(e){
        div.innerHTML = "<div class='card'>Erreur interaction</div>";
    }
}


// 📊 FICHE COMPLETE
async function ficheComplete(){
    let val = document.getElementById("searchInput").value;
    let div = document.getElementById("resultats");

    try{
        let res = await fetch(${API}/fiche?nom=${encodeURIComponent(val)});
        let data = await res.json();

        if(data.fiche){
            div.innerHTML = `
            <div class="card">
                <h3>📊 Fiche complète</h3>
                <pre style="white-space: pre-wrap;">
${data.fiche}
                </pre>
            </div>`;
        } else {
            div.innerHTML = <div class="card">Aucune fiche disponible</div>;
        }

    } catch(e){
        div.innerHTML = "<div class='card'>Erreur fiche</div>";
    }
}

</script>

</body>
</html>
