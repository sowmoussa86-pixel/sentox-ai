<h1 style="color:red;">VERSION 2 SENTOX</h1>
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SENTOX ULTIME</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #0f2027, #2c5364);
  color: white;
}

.box {
  background: white;
  color: black;
  padding: 20px;
  margin: 40px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
}

input {
  padding: 10px;
  width: 80%;
}

button {
  padding: 10px;
  margin: 5px;
  background: #2c5364;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #1b3c4a;
}

img {
  width: 150px;
}

#res {
  margin-top: 20px;
  text-align: left;
}
</style>
</head>

<body>

<div class="box">
  <img src="logo.png">
  <h2>SENTOX ULTIME</h2>

  <input id="produit" placeholder="Produit (ex: paracetamol, neem, 71-43-2)">
  <br><br>

  <button onclick="analyser()">Analyse</button>
  <button onclick="ouvrirPDF()">PDF</button>

  <div id="res"></div>
</div>

<script>
async function analyser() {
  let p = document.getElementById("produit").value;

  let r = await fetch(`/search?q=${p}`);
  let result = await r.json();

  let container = document.getElementById("res");

  if (result.message) {
    container.innerHTML = result.message;
    return;
  }

  let d = result.data;
  let html = `<h3>${d.nom_scientifique || d.nom_commercial || d.nom}</h3>`;

  // 🌿 PLANTES
  if (result.type === "plante") {
    html += `
      <p>Nom local: ${d.nom_local}</p>
      <p>Partie utilisée: ${d.partie_utilisee}</p>
      <p>Principe actif: ${d.principe_actif}</p>
      <p>Indication: ${d.indication}</p>
      <p>Dose: ${d.dose}</p>
      <p>DL50: ${d.dl50}</p>
      <p>Risque: ${d.risque}</p>
    `;
  }

  // 💊 MÉDICAMENTS
  if (result.type === "medicament") {
    html += `
      <p>DCI: ${d.dci}</p>
      <p>Classe: ${d.classe}</p>
      <p>Formule: ${d.chimie?.formule}</p>
      <p>IUPAC: ${d.chimie?.iupac}</p>
      <p>CAS: ${d.chimie?.cas}</p>
      <p>DL50: ${d.toxicologie?.dl50}</p>
      <p>Organes cibles: ${d.toxicologie?.organes_cibles}</p>
      <p>Effets graves: ${d.toxicologie?.effets_graves}</p>
    `;
  }

  // ☣️ SUBSTANCES
  if (result.type === "substance") {
    html += `
      <p>CAS: ${d.cas}</p>
      <p>Famille: ${d.famille}</p>
      <p>Formule: ${d.physicochimie?.formule}</p>
      <p>DL50: ${d.toxicologie?.dl50}</p>
      <p>Cancérogène: ${d.toxicologie?.cancerogenicite}</p>
      <p>Voies d'exposition: ${d.securite?.voies_exposition}</p>
    `;
  }

  html += `<br><a href="/pdf/${d.pdf}" target="_blank">📄 PDF</a>`;

  container.innerHTML = html;
}
</script>

</body>
</html>
