<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENTOX</title>

<style>
body {
  margin:0;
  font-family: Arial;
  text-align:center;
  background:#f4f6f8;
}

/* 🔥 LOGO PLEIN ÉCRAN */
.hero {
  width:100%;
  height:300px;
  background:url("logo.png") center/cover no-repeat;
}

h1 {
  color:#2e7d32;
}

/* INPUT */
input {
  width:80%;
  max-width:400px;
  padding:15px;
  border-radius:10px;
  border:1px solid #ccc;
  margin-top:20px;
}

/* BOUTONS */
button {
  margin:10px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#2e7d32;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* RESULTATS */
.card {
  background:white;
  margin:20px;
  padding:15px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:left;
}
</style>

</head>

<body>

<div class="hero"></div>

<h1>SENTOX</h1>

<input id="searchInput" placeholder="Entrer une substance...">

<br>

<button id="btnSearch">🔎 Recherche</button>
<button id="btnInteraction">⚗️ Interaction</button>
<button id="btnFiche">📄 Fiche</button>
<button id="btnPDF">📥 PDF</button>
<button id="btnIA">🧠 Analyse IA</button>

<div id="results"></div>

<script src="script.js"></script>

</body>
</html>
