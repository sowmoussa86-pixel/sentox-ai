<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SENTOX PRO</title>
</head>

<body style="font-family:Arial; text-align:center;">

<h2>SENTOX PRO</h2>

<input id="produit" placeholder="Produit"><br><br>

<button onclick="analyser()">Analyser</button>
<button onclick="full()">Full AI</button>
<button onclick="ia()">IA</button>
<button onclick="pdf()">PDF</button>

<div id="res"></div>

<script>

async function analyser(){
    let p = document.getElementById("produit").value;
    let r = await fetch(`/analyze?produit=${p}`);
    let d = await r.json();
    afficher(d);
}

async function full(){
    let p = document.getElementById("produit").value;
    let r = await fetch(`/full-ai?produit=${p}`);
    let d = await r.json();

    document.getElementById("res").innerHTML = `
        <h3>${d.local.nom}</h3>
        <p>Type : ${d.type}</p>
        <p>Risque : ${d.local.risque}</p>
        <p>Score : ${d.local.score}/10</p>

        <hr>

        <p><b>PubChem :</b> ${d.pubchem?.PropertyTable ? "Données disponibles" : "Études en cours"}</p>
        <p><b>PubMed :</b> ${d.pubmed?.esearchresult ? "Articles disponibles" : "Études en cours"}</p>
    `;
}

async function ia(){
    let p = document.getElementById("produit").value;
    let r = await fetch(`/ai?produit=${p}`);
    let d = await r.json();
    alert(d.interpretation);
}

function pdf(){
    let p = document.getElementById("produit").value;
    window.open(`/pdf?produit=${p}`);
}

function afficher(d){
    document.getElementById("res").innerHTML = `
        <h3>${d.nom}</h3>
        <p>Risque: ${d.risque}</p>
        <p>Score: ${d.score}</p>
    `;
}

</script>

</body>
</html>
